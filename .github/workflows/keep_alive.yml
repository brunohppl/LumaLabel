name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping LUMA Warehouse
        run: |
          curl -s https://lumalabel.onrender.com/health
          echo "Pinged at $(date)"
