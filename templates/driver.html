<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LUMA — Driver View</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1A1714; --muted: #9A8F80; --border: #D8CFBF;
  --warm: #F2EDE4; --cream: #FAF8F4; --accent: #B8935A;
  --green: #4A7C59; --green-light: rgba(74,124,89,0.1);
  --red: #A63D2F;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--cream); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 400; font-size: 17px; min-height: 100vh; max-width: 480px; margin: 0 auto; }

/* Header */
.hdr { background: var(--ink); padding: 16px 20px; position: sticky; top: 0; z-index: 50; }
.hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.hdr-logo { font-size: 0.8rem; letter-spacing: 0.2em; color: rgba(250,248,244,0.4); text-transform: uppercase; }
.hdr-status { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px; border-radius: 1px; }
.status-ready  { background: rgba(74,124,89,0.2); color: #6BBF8A; }
.status-loaded { background: rgba(184,147,90,0.2); color: var(--accent); }

.hdr-job { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
.hdr-ref { font-size: 2.4rem; font-weight: 600; color: var(--accent); line-height: 1; }
.hdr-addr { font-size: 0.9rem; color: rgba(250,248,244,0.65); }

/* Progress bar */
.prog-wrap { display: flex; align-items: center; gap: 10px; }
.prog-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
.prog-txt { font-size: 0.78rem; color: rgba(250,248,244,0.6); white-space: nowrap; font-weight: 500; }

/* Content */
.content { padding: 16px; padding-bottom: 80px; }

/* Room sections */
.room-section { margin-bottom: 20px; }
.room-label { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 600; padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

/* Item rows */
.item { background: white; border: 1px solid var(--border); border-radius: 2px; margin-bottom: 4px; display: flex; align-items: center; gap: 0; overflow: hidden; transition: all 0.2s; }
.item.checked { background: var(--green-light); border-color: rgba(74,124,89,0.35); }

.item-check-btn { width: 64px; height: 68px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
.item-check-btn:active { background: var(--warm); }

.check-circle { width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid var(--border); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.item.checked .check-circle { background: var(--green); border-color: var(--green); }
.check-tick { display: none; color: white; font-size: 1rem; font-weight: 700; }
.item.checked .check-tick { display: block; }
.check-empty { display: block; }
.item.checked .check-empty { display: none; }

.item-info { flex: 1; padding: 12px 12px 12px 0; }
.item-serial { font-size: 0.75rem; font-weight: 600; color: var(--accent); letter-spacing: 0.1em; }
.item-desc { font-size: 1rem; color: var(--ink); margin-top: 3px; line-height: 1.4; font-weight: 400; }
.item-extra-tag { font-size: 0.75rem; color: var(--muted); font-style: italic; }
.item-note { font-size: 0.82rem; color: var(--accent); margin-top: 5px; font-style: italic; padding: 4px 8px; background: rgba(184,147,90,0.08); border-radius: 2px; }

/* All done banner */
.done-banner { display: none; background: rgba(74,124,89,0.1); border: 1px solid rgba(74,124,89,0.3); border-radius: 2px; padding: 20px; text-align: center; margin-bottom: 20px; }
.done-banner.show { display: block; }
.done-icon { font-size: 2rem; }
.done-title { font-size: 1.5rem; font-weight: 500; color: var(--green); margin-top: 6px; }
.done-sub { font-size: 0.85rem; color: var(--muted); margin-top: 6px; }

/* Confirm button */
.confirm-wrap { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 16px; background: linear-gradient(transparent, var(--cream) 30%); z-index: 40; }
.confirm-btn { display: none; width: 100%; padding: 18px; background: var(--ink); color: var(--cream); border: none; border-radius: 2px; font-family: 'Jost', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; }
.confirm-btn.show { display: block; }
.confirm-btn:active { opacity: 0.85; }

/* Loading */
.loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.82rem; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">LUMA Warehouse</div>
    <div class="hdr-status status-ready" id="status-badge">Ready</div>
  </div>
  <div class="hdr-job">
    <div class="hdr-ref" id="job-ref">—</div>
    <div class="hdr-addr" id="job-addr"></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-txt" id="prog-txt">0 / 0</div>
  </div>
</div>

<div class="content">
  <div class="done-banner" id="done-banner">
    <div class="done-icon">✓</div>
    <div class="done-title">All Items Loaded</div>
    <div class="done-sub">Tap confirm to mark truck as loaded</div>
  </div>
  <div id="items-container">
    <div class="loading"><div class="spinner"></div>Loading job…</div>
  </div>
</div>

<div class="confirm-wrap">
  <button class="confirm-btn" id="confirm-btn" onclick="confirmLoaded()">
    Confirm Truck Loaded
  </button>
</div>

<script>
// Get job ID from URL: /driver/JOB_ID
const jobId = window.location.pathname.split('/').pop();
let job     = null;
let items   = [];

async function loadJob() {
  const res  = await fetch(`/api/jobs/${jobId}`);
  const data = await res.json();
  job   = data.job;
  items = data.items;

  document.getElementById('job-ref').textContent  = job.job_ref || job.job_number;
  document.getElementById('job-addr').textContent = job.address;

  const badge = document.getElementById('status-badge');
  badge.textContent  = job.status === 'loaded' ? 'Loaded' : 'Ready';
  badge.className    = `hdr-status status-${job.status === 'loaded' ? 'loaded' : 'ready'}`;

  renderItems();
  updateProgress();
}

function renderItems() {
  const container = document.getElementById('items-container');
  const regular   = items.filter(i => !i.is_extra);
  const extras    = items.filter(i => i.is_extra);

  // Group by room
  const rooms = {};
  for (const item of regular) {
    if (!rooms[item.room]) rooms[item.room] = [];
    rooms[item.room].push(item);
  }

  let html = '';
  for (const [room, roomItems] of Object.entries(rooms)) {
    html += `<div class="room-section">
      <div class="room-label">${room || 'General'}</div>
      ${roomItems.map(itemHTML).join('')}
    </div>`;
  }
  if (extras.length) {
    html += `<div class="room-section">
      <div class="room-label">Extras</div>
      ${extras.map(itemHTML).join('')}
    </div>`;
  }

  container.innerHTML = html;
}

function itemHTML(item) {
  const cls  = item.checked ? 'item checked' : 'item';
  const note = item.notes ? `<div class="item-note">📝 ${item.notes}</div>` : '';
  return `
    <div class="${cls}" id="item-${item.id}" onclick="toggleItem('${item.id}')">
      <button class="item-check-btn">
        <div class="check-circle">
          <span class="check-tick">✓</span>
          <span class="check-empty"></span>
        </div>
      </button>
      <div class="item-info">
        <div class="item-serial">#${item.serial}</div>
        <div class="item-desc">${item.description || '<span class="item-extra-tag">blank extra</span>'}</div>
        ${note}
      </div>
    </div>`;
}

async function toggleItem(itemId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;

  const newChecked = !item.checked;
  item.checked = newChecked;

  // Update UI immediately
  const el = document.getElementById(`item-${itemId}`);
  if (newChecked) el.classList.add('checked');
  else            el.classList.remove('checked');

  updateProgress();

  // Persist to DB
  await fetch(`/api/items/${itemId}/check`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({checked: newChecked})
  });
}

function updateProgress() {
  const total   = items.length;
  const checked = items.filter(i => i.checked).length;
  const pct     = total ? Math.round(checked / total * 100) : 0;

  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent  = `${checked} / ${total}`;

  const allDone    = total > 0 && checked === total;
  const doneBanner = document.getElementById('done-banner');
  const confirmBtn = document.getElementById('confirm-btn');

  doneBanner.classList.toggle('show', allDone);
  confirmBtn.classList.toggle('show', allDone && job.status !== 'loaded');
}

async function confirmLoaded() {
  await fetch(`/api/jobs/${job.id}/status`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({status: 'loaded'})
  });
  job.status = 'loaded';
  document.getElementById('status-badge').textContent = 'Loaded';
  document.getElementById('status-badge').className   = 'hdr-status status-loaded';
  document.getElementById('confirm-btn').classList.remove('show');
  document.getElementById('done-banner').querySelector('.done-sub').textContent = 'Truck confirmed loaded ✓';
}

loadJob();
</script>
</body>
</html>
