<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LUMA — Driver</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1A1714;--muted:#9A8F80;--border:#D8CFBF;--warm:#F2EDE4;--cream:#FAF8F4;--accent:#B8935A;--green:#4A7C59;--green-light:rgba(74,124,89,0.1);--red:#A63D2F;--blue:#4A7EB8;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#EDEAE4;color:var(--ink);font-family:'Jost',sans-serif;font-weight:400;font-size:17px;min-height:100vh;max-width:540px;margin:0 auto;}

/* ── HEADER ── */
.hdr{background:var(--ink);padding:16px 20px;position:sticky;top:0;z-index:50;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hdr-logo{font-size:0.72rem;letter-spacing:0.22em;color:rgba(250,248,244,0.35);text-transform:uppercase;}
.pill{display:inline-block;padding:5px 14px;border-radius:1px;font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;}
.pill-readyload{background:rgba(184,147,90,0.25);color:var(--accent);}
.pill-loading{background:rgba(232,92,71,0.2);color:#E8856A;}
.pill-loaded{background:rgba(74,124,89,0.25);color:#6BBF8A;}
.pill-installed{background:rgba(74,124,89,0.45);color:#9FFFCE;font-weight:800;}
.pill-returned{background:rgba(74,126,184,0.3);color:#8ABAEE;font-weight:800;}
.hdr-ref{font-size:2.6rem;font-weight:700;color:var(--accent);line-height:1;letter-spacing:-0.01em;}
.hdr-addr{font-size:0.92rem;color:rgba(250,248,244,0.6);margin-top:2px;display:block;text-decoration:none;cursor:pointer;}
.hdr-addr:hover{color:var(--accent);text-decoration:underline;}
.hdr-owner{font-size:0.8rem;color:rgba(250,248,244,0.35);margin-top:1px;}
.prog-wrap{display:flex;align-items:center;gap:12px;margin-top:10px;}
.prog-bar{flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.4s ease;}
.prog-txt{font-size:0.82rem;color:rgba(250,248,244,0.55);white-space:nowrap;font-weight:600;}

/* ── TRUCK ── */
.driver-notes-banner{background:rgba(184,147,90,0.08);border-bottom:1px solid rgba(184,147,90,0.3);padding:14px 20px;}
.driver-notes-label{display:flex;align-items:center;gap:8px;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px;}
#driver-notes-text{font-size:0.92rem;color:var(--ink);line-height:1.5;}
.transfer-banner{background:rgba(74,126,184,0.1);border-bottom:1px solid rgba(74,126,184,0.35);padding:12px 20px;font-size:0.88rem;color:var(--ink);line-height:1.4;}
.transfer-banner b{color:var(--blue);}
.transfer-banner-out{background:rgba(184,147,90,0.1);border-bottom:1px solid rgba(184,147,90,0.35);}
.transfer-banner-out b{color:var(--accent);}
.truck-section{background:white;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.truck-label{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);white-space:nowrap;font-weight:600;}
.truck-input{flex:1;background:var(--warm);border:1px solid var(--border);border-radius:1px;padding:10px 13px;font-family:'Jost',sans-serif;font-size:1rem;color:var(--ink);outline:none;}
.truck-input:focus{border-color:var(--accent);}
.truck-save{padding:10px 16px;background:var(--accent);color:white;border:none;border-radius:1px;font-family:'Jost',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;}

/* ── ACTION BAR ── */
.action-bar{background:white;border-bottom:2px solid var(--border);padding:14px 20px;}
.action-btn{width:100%;padding:16px;border:none;border-radius:1px;font-family:'Jost',sans-serif;font-size:0.88rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;}
.action-btn:active{opacity:0.8;}
.btn-start{background:var(--accent);color:white;}
.btn-finish{background:var(--green);color:white;}
.btn-installed{background:var(--ink);color:var(--cream);}
.btn-returned{background:#1565C0;color:white;}
.action-status-msg{font-size:0.88rem;color:var(--muted);text-align:center;padding:4px 0;}

/* ── CONTENT ── */
.content{padding:16px;padding-bottom:40px;}

/* ── ROOM CARDS ── */
.room-card{background:white;border-radius:3px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.room-card-header{padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.15s;}
.room-card-header:active{background:var(--warm);}
.room-card.done .room-card-header{background:var(--green-light);}

.not-transferring-card{border:2px solid var(--accent);}
.not-transferring-card .room-card-header{background:rgba(184,147,90,0.08);}
.not-transferring-card .room-card-name{color:var(--accent);}
.not-transferring-card.done .room-card-header{background:var(--green-light);}
.not-transferring-card.done .room-card-name{color:var(--green);}

/* Progress ring */
.ring-wrap{flex-shrink:0;width:48px;height:48px;position:relative;}
.ring-bg{fill:none;stroke:var(--border);stroke-width:4;}
.ring-fill{fill:none;stroke:var(--green);stroke-width:4;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 0.4s ease;}
.ring-done .ring-fill{stroke:var(--green);}
.ring-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;color:var(--ink);}
.ring-done-icon{font-size:1.1rem;color:var(--green);}

.room-card-info{flex:1;min-width:0;}
.room-card-name{font-size:1.1rem;font-weight:600;color:var(--ink);letter-spacing:0.02em;}
.room-card.done .room-card-name{color:var(--green);}
.room-card-sub{font-size:0.78rem;color:var(--muted);margin-top:2px;}
.room-chevron{font-size:0.75rem;color:var(--muted);transition:transform 0.25s;flex-shrink:0;}
.room-chevron.open{transform:rotate(180deg);}

/* Item list inside card */
.room-items{border-top:1px solid var(--border);display:none;}
.room-items.open{display:block;}
.group-row{display:flex;align-items:center;padding:0;border-bottom:1px solid var(--warm);transition:background 0.15s;}
.group-row:last-child{border-bottom:none;}
.group-row.checked{background:var(--green-light);}
.check-btn{width:64px;min-height:64px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check-btn:active{background:var(--warm);}
.check-circle{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.group-row.checked .check-circle{background:var(--green);border-color:var(--green);}
.check-tick{display:none;color:white;font-size:1rem;font-weight:700;}
.group-row.checked .check-tick{display:block;}
.check-empty{display:block;width:8px;height:8px;}
.group-row.checked .check-empty{display:none;}
.group-info{flex:1;padding:14px 14px 14px 0;}
.group-serial{font-size:0.75rem;font-weight:700;color:var(--accent);letter-spacing:0.08em;}
.group-desc{font-size:1rem;color:var(--ink);margin-top:3px;line-height:1.4;font-weight:500;}
.group-row.checked .group-desc{color:var(--muted);}
.group-location{font-size:0.85rem;font-weight:400;color:var(--muted);}

.group-row-transfer{display:flex;align-items:center;padding:0;border-bottom:1px solid var(--warm);background:rgba(74,126,184,0.08);}
.group-row-transfer:last-child{border-bottom:none;}
.transfer-row-icon{width:64px;min-height:64px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--blue);}
.transfer-row-tag{font-size:0.78rem;font-weight:600;color:var(--blue);margin-top:5px;letter-spacing:0.02em;}
.group-row-transfer .group-desc{color:var(--blue);}
.group-row-not-transferring{background:rgba(184,147,90,0.06);}
.group-row-not-transferring .group-desc{color:var(--accent);}
.not-transferring-row-tag{font-size:0.78rem;font-weight:600;color:var(--accent);margin-top:5px;letter-spacing:0.02em;}
.group-note{font-size:0.82rem;color:var(--accent);margin-top:5px;font-style:italic;padding:4px 8px;background:rgba(184,147,90,0.08);border-radius:2px;}
.photo-thumb-wrap{margin-top:6px;}
.photo-thumb-btn{background:none;border:1px solid var(--border);border-radius:2px;padding:4px 10px;font-size:0.72rem;color:var(--muted);cursor:pointer;}
.photo-thumb-btn:active{background:var(--warm);}
.photo-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;}
.photo-modal.open{display:flex;}
.photo-modal img{max-width:95vw;max-height:90vh;border-radius:3px;}
.photo-modal-close{position:absolute;top:16px;right:20px;color:white;font-size:2rem;cursor:pointer;background:none;border:none;}

/* Done banner */
.done-banner{display:none;background:rgba(74,124,89,0.1);border:1px solid rgba(74,124,89,0.3);border-radius:2px;padding:22px;text-align:center;margin-bottom:16px;}
.done-banner.show{display:block;}
.done-title{font-size:1.5rem;font-weight:600;color:var(--green);}
.done-sub{font-size:0.88rem;color:var(--muted);margin-top:5px;}

.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">LUMA Warehouse</div>
    <div id="status-badge" class="pill pill-readyload">Ready to Load</div>
  </div>
  <div class="hdr-ref" id="job-ref">—</div>
  <a class="hdr-addr" id="job-addr" href="#" target="_blank" onclick="return onAddressClick(event)"></a>
  <div class="hdr-owner" id="job-owner"></div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-txt" id="prog-txt">0 / 0</div>
  </div>
</div>

<div class="driver-notes-banner" id="driver-notes-banner" style="display:none;">
  <div class="driver-notes-label">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
    Notes from Stylist
  </div>
  <div id="driver-notes-text"></div>
</div>

<div class="transfer-banner" id="transfer-banner" style="display:none;"></div>
<div class="transfer-banner transfer-banner-out" id="transfer-out-banner" style="display:none;"></div>

<div class="truck-section">
  <div class="truck-label">Truck</div>
  <input type="text" class="truck-input" id="truck-input" placeholder="Enter truck name or number"/>
  <button class="truck-save" onclick="saveTruck()">Save</button>
</div>

<div class="action-bar" id="action-bar"></div>

<div class="content">
  <div class="done-banner" id="done-banner">
    <div class="done-title">All Items Loaded</div>
    <div class="done-sub">Tap the button above to complete</div>
  </div>
  <div id="items-container">
    <div class="loading"><div class="spinner"></div>Loading job…</div>
  </div>
</div>

<!-- Photo viewer modal -->
<div class="photo-modal" id="photo-modal" onclick="closePhoto()">
  <button class="photo-modal-close" onclick="closePhoto()">✕</button>
  <img id="photo-modal-img" src="" alt="Item photo"/>
</div>

<script>
function showPhoto(url){
  document.getElementById('photo-modal-img').src=url;
  document.getElementById('photo-modal').classList.add('open');
}
function closePhoto(){
  document.getElementById('photo-modal').classList.remove('open');
}

const jobId=window.location.pathname.split('/').pop();
let job=null,items=[];
const STATUS_PILLS={ready_to_load:'pill-readyload',loading:'pill-loading',loaded:'pill-loaded',installed:'pill-installed',returned:'pill-returned',archived:'pill-returned'};
const STATUS_LABELS={ready_to_load:'Ready to Load',loading:'Loading',loaded:'Loaded',installed:'Installed',returned:'Returned',archived:'Returned'};

async function loadJob(){
  const res=await fetch(`/api/jobs/${jobId}`);
  const data=await res.json();
  job=data.job;items=data.items;
  document.getElementById('job-ref').textContent=job.job_ref||job.job_number;
  const addrLink=document.getElementById('job-addr');
  addrLink.textContent=job.address;
  addrLink.href=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(job.address||'')}`;
  document.getElementById('job-owner').textContent=job.job_owner||'';
  if(job.truck)document.getElementById('truck-input').value=job.truck;

  const notesBanner=document.getElementById('driver-notes-banner');
  if(job.driver_notes && job.driver_notes.trim()){
    document.getElementById('driver-notes-text').textContent=job.driver_notes;
    notesBanner.style.display='block';
  } else {
    notesBanner.style.display='none';
  }

  const transferBanner=document.getElementById('transfer-banner');
  if(job.is_transfer){
    if(job.transfer_from_job_id){
      try{
        const srcRes=await fetch(`/api/jobs/${job.transfer_from_job_id}`);
        const srcData=await srcRes.json();
        const src=srcData.job;
        transferBanner.innerHTML=`<b>Transfer From</b> — items marked "Transfer" below are already in the truck from ${src.job_ref||src.job_number} (${src.address||''})`;
      }catch(e){
        transferBanner.innerHTML=`<b>Transfer From</b> — items marked "Transfer" below are already in the truck`;
      }
    } else {
      transferBanner.innerHTML=`<b>Transfer From</b> — items marked "Transfer" below are already in the truck`;
    }
    transferBanner.style.display='block';
  } else {
    transferBanner.style.display='none';
  }

  const transferOutBanner=document.getElementById('transfer-out-banner');
  const transferringTo=data.transferring_to||[];
  if(transferringTo.length){
    const links=transferringTo.map(j=>`${j.job_ref||j.job_number} (${j.address||''})`).join(', ');
    transferOutBanner.innerHTML=`<b>Transferring To</b> — items marked "Not Transferring" below stay behind; everything else goes to ${links}`;
    transferOutBanner.style.display='block';
  } else {
    transferOutBanner.style.display='none';
  }

  renderStatusBar();renderRooms();updateProgress();
}

function onAddressClick(event){
  event.preventDefault();
  const mapsUrl = event.currentTarget.href;

  // Previously this let the link navigate immediately while geolocation
  // ran in the background. On mobile, navigating away (especially when
  // target="_blank" hands off to the native Maps app rather than a
  // browser tab) can suspend this page's JS before the async geolocation
  // callback fires — so the ETA request silently never completes, with
  // no error since the page just stops running mid-flight. Fixed by
  // waiting for geolocation to resolve (success or failure) before
  // opening Maps at all, so the request is fully sent first.
  if(!navigator.geolocation){
    console.log('[ETA] geolocation not supported on this device/browser');
    window.open(mapsUrl, '_blank');
    return false;
  }

  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      fetch(`/api/jobs/${job.id}/eta`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude,role:'truck'})
      }).then(r=>r.json()).then(data=>{
        // Calculating the ETA, saving it, and posting to Slack all
        // happen together server-side in one request now — no separate
        // confirm step. See /api/jobs/<id>/eta in app.py.
        console.log('[ETA] response:', data);
        window.open(mapsUrl, '_blank');
      }).catch(err=>{
        console.log('[ETA] fetch failed:', err);
        window.open(mapsUrl, '_blank');
      });
    },
    (err)=>{
      console.log('[ETA] geolocation error:', err);
      window.open(mapsUrl, '_blank'); // still open Maps even if location failed
    },
    {timeout:8000}
  );
  return false;
}

function renderStatusBar(){
  const s=job.status;
  const badge=document.getElementById('status-badge');
  badge.className='pill '+(STATUS_PILLS[s]||'pill-readyload');
  badge.textContent=STATUS_LABELS[s]||s;
  const bar=document.getElementById('action-bar');
  if(s==='ready_to_load') bar.innerHTML=`<button class="action-btn btn-start" onclick="setStatus('loading')">Start Loading</button>`;
  else if(s==='loading')  bar.innerHTML=`<button class="action-btn btn-finish" onclick="finishLoading()">Loading Finished</button>`;
  else if(s==='loaded')   bar.innerHTML=`<button class="action-btn btn-installed" onclick="setStatus('installed')">Installed</button>`;
  else if(s==='installed')bar.innerHTML=`<button class="action-btn btn-returned" onclick="setStatus('returned')">Mark Returned</button>`;
  else if(s==='returned'||s==='archived') bar.innerHTML=`<div class="action-status-msg">Truck returned to warehouse — job complete</div>`;
  else bar.innerHTML=`<div class="action-status-msg">Waiting for stylist to complete picking…</div>`;
}

// ── Item type categories ──
const ITEM_CATEGORIES = [
  { label: 'Sofas',            keywords: ['sofa','settee','lounge'] },
  { label: 'Chairs',          keywords: ['chair','barstool','stool','bench seat'] },
  { label: 'Beds & Mattresses', keywords: ['ensemble','mattress','bed frame','headboard','bedhead','bedside'] },
  { label: 'Tables',          keywords: ['table','desk'] },
  { label: 'Storage & Consoles', keywords: ['console','buffet','dresser','entertainment unit','etu','shelv','bookshelf','wardrobe'] },
  { label: 'Rugs',            keywords: ['rug'] },
  { label: 'Lamps & Lighting',keywords: ['lamp','plant','floor lamp'] },
  { label: 'Artwork',         keywords: ['artwork'] },
  { label: 'Soft Furnishings',keywords: ['cushion','throw','linen','coverlet','pillow','towel'] },
  { label: 'Outdoor',         keywords: ['outdoor'] },
  { label: 'Accessories',     keywords: ['accessor','centrepiece','mirror'] },
];

function getCategory(desc){
  if(!desc) return 'Other';
  const d = desc.toLowerCase();
  for(const cat of ITEM_CATEGORIES){
    if(cat.keywords.length && cat.keywords.some(k=>d.includes(k))) return cat.label;
  }
  return 'Other';
}

function groupItems(list){
  const groups=[];let i=0;
  while(i<list.length){
    const desc=list[i].description||'';
    const room=list[i].room||'';
    const notTransferring=!!list[i].not_transferring;
    let j=i+1;
    while(j<list.length&&(list[j].description||'')===desc&&(list[j].room||'')===room&&!!list[j].not_transferring===notTransferring)j++;
    groups.push({count:j-i,description:desc,room:room,firstSerial:list[i].serial,lastSerial:list[j-1].serial,
      items:list.slice(i,j),allChecked:list.slice(i,j).every(x=>x.checked),notes:list[i].notes||'',
      photo_url:list.slice(i,j).find(x=>x.photo_url)?.photo_url||null,
      isTransferItem:list.slice(i,j).every(x=>x.is_transfer_item),
      isNotTransferring:notTransferring,
      category:getCategory(desc)});
    i=j;
  }
  return groups;
}

function renderRooms(){
  const container=document.getElementById('items-container');
  const allGrouped=groupItems(items.filter(i=>!i.is_extra));

  // "Not Transferring" items sit in their own group at the top, separate
  // from the item-type categories — these are real loadable items (going
  // back to warehouse rather than on to the next job), not excluded from
  // progress the way is_transfer_item is on the receiving end. Pulled out
  // before building the category map so they don't also appear under
  // their normal category.
  const notTransferGroups = allGrouped.filter(g=>g.isNotTransferring);
  const categoryGrouped   = allGrouped.filter(g=>!g.isNotTransferring);

  // Build category map
  const catMap={};
  for(const grp of categoryGrouped){
    if(!catMap[grp.category])catMap[grp.category]=[];
    catMap[grp.category].push(grp);
  }


  // Render in defined order, skip empty categories
  const orderedCats=ITEM_CATEGORIES.map(c=>c.label).filter(l=>catMap[l]);
  Object.keys(catMap).forEach(c=>{if(!orderedCats.includes(c))orderedCats.push(c);});

  let html='';

  if(notTransferGroups.length){
    const ntItems=notTransferGroups.flatMap(g=>g.items);
    const checked=ntItems.filter(i=>i.checked).length;
    const total=ntItems.length;
    const done=checked===total&&total>0;
    const r=20,circ=2*Math.PI*r,offset=circ*(1-(total?checked/total:0));
    html+=`<div class="room-card not-transferring-card${done?' done':''}" id="room-not_transferring">
      <div class="room-card-header" onclick="toggleRoomCard(this)">
        <div class="ring-wrap">
          <svg width="48" height="48" viewBox="0 0 48 48">
            <circle class="ring-bg" cx="24" cy="24" r="${r}"/>
            <circle class="ring-fill${done?' ring-done':''}" cx="24" cy="24" r="${r}"
              stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
          </svg>
          <div class="ring-txt">${done?'<span class="ring-done-icon">✓</span>':`${checked}/${total}`}</div>
        </div>
        <div class="room-card-info">
          <div class="room-card-name">Not Transferring</div>
          <div class="room-card-sub">${notTransferGroups.length} line${notTransferGroups.length!==1?'s':''} · ${total} item${total!==1?'s':''} — staying behind</div>
        </div>
        <div class="room-chevron open" id="chev-not_transferring">▼</div>
      </div>
      <div class="room-items open" id="items-not_transferring">
        ${notTransferGroups.map(g=>groupRowHTML(g)).join('')}
      </div>
    </div>`;
  }

  for(const cat of orderedCats){
    const groups=catMap[cat];
    const catItems=groups.flatMap(g=>g.items);
    const loadable=catItems.filter(i=>!i.is_transfer_item);
    const checked=loadable.filter(i=>i.checked).length;
    const total=loadable.length;
    const done=checked===total&&total>0;
    const r=20,circ=2*Math.PI*r,offset=circ*(1-(total?checked/total:0));
    const key=cat.replace(/[^a-zA-Z0-9]/g,'_');
    html+=`<div class="room-card${done?' done':''}" id="room-${key}">
      <div class="room-card-header" onclick="toggleRoomCard(this)">
        <div class="ring-wrap">
          <svg width="48" height="48" viewBox="0 0 48 48">
            <circle class="ring-bg" cx="24" cy="24" r="${r}"/>
            <circle class="ring-fill${done?' ring-done':''}" cx="24" cy="24" r="${r}"
              stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
          </svg>
          <div class="ring-txt">${done?'<span class="ring-done-icon">✓</span>':`${checked}/${total}`}</div>
        </div>
        <div class="room-card-info">
          <div class="room-card-name">${cat}</div>
          <div class="room-card-sub">${groups.length} line${groups.length!==1?'s':''} · ${total} item${total!==1?'s':''}</div>
        </div>
        <div class="room-chevron" id="chev-${key}">▼</div>
      </div>
      <div class="room-items" id="items-${key}">
        ${groups.map(g=>groupRowHTML(g)).join('')}
      </div>
    </div>`;
  }
  container.innerHTML=html;
}

function groupRowHTML(grp){
  if(grp.isTransferItem){
    const serial=grp.count>1?`#${grp.firstSerial}–#${grp.lastSerial}`:`#${grp.firstSerial}`;
    const desc=grp.count>1?`${grp.count}×  ${grp.description||'blank'}`:(grp.description||'<span style="opacity:0.5">blank extra</span>');
    const location=grp.room?` <span class="group-location">(${grp.room})</span>`:'';
    const note=grp.notes?`<div class="group-note">${grp.notes}</div>`:'';
    return `<div class="group-row group-row-transfer">
      <div class="transfer-row-icon" title="Already in truck — transferring from another job">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="1.5"/><circle cx="18.5" cy="18.5" r="1.5"/></svg>
      </div>
      <div class="group-info">
        <div class="group-serial">${serial}</div>
        <div class="group-desc">${desc}${location}</div>
        <div class="transfer-row-tag">Already in truck — no need to load</div>
        ${note}
      </div>
    </div>`;
  }

  const cls=(grp.allChecked?'group-row checked':'group-row')+(grp.isNotTransferring?' group-row-not-transferring':'');
  const ids=grp.items.map(i=>i.id).join(',');
  const serial=grp.count>1?`#${grp.firstSerial}–#${grp.lastSerial}`:`#${grp.firstSerial}`;
  const desc=grp.count>1?`${grp.count}×  ${grp.description||'blank'}`:(grp.description||'<span style="opacity:0.5">blank extra</span>');
  const location=grp.room?` <span class="group-location">(${grp.room})</span>`:'';
  const note=grp.notes?`<div class="group-note">${grp.notes}</div>`:'';
  const notTransferTag=grp.isNotTransferring?`<div class="not-transferring-row-tag">Staying behind — not part of the transfer</div>`:'';
  const photoUrl=grp.photo_url||null;
  const photoBtn=photoUrl?`<div class="photo-thumb-wrap"><button class="photo-thumb-btn" onclick="event.stopPropagation();showPhoto('${photoUrl}')">View Photo</button></div>`:'';
  return `<div class="${cls}" id="grp-${grp.firstSerial}" onclick="toggleGroup('${ids}',this)">
    <button class="check-btn" onclick="toggleGroup('${ids}',this.closest('.group-row'));event.stopPropagation()">
      <div class="check-circle"><span class="check-tick">✓</span><span class="check-empty"></span></div>
    </button>
    <div class="group-info">
      <div class="group-serial">${serial}</div>
      <div class="group-desc">${desc}${location}</div>
      ${notTransferTag}
      ${note}
      ${photoBtn}
    </div>
  </div>`;
}

function toggleRoomCard(header){
  const card=header.closest('.room-card');
  const key=card.id.replace('room-','');
  const itemsDiv=document.getElementById('items-'+key);
  const chev=document.getElementById('chev-'+key);
  const isOpen=itemsDiv.classList.contains('open');
  itemsDiv.classList.toggle('open',!isOpen);
  chev.classList.toggle('open',!isOpen);
}

async function toggleGroup(ids,el){
  if(job.status==='installed'||job.status==='returned'||job.status==='archived')return;
  const idList=ids.split(',');
  const first=items.find(i=>i.id===idList[0]);
  if(!first)return;
  const newChecked=!first.checked;
  for(const id of idList){const item=items.find(i=>i.id===id);if(item)item.checked=newChecked;}
  if(newChecked)el.classList.add('checked');else el.classList.remove('checked');
  updateProgress();
  rerenderRoomProgress();
  await Promise.all(idList.map(id=>
    fetch(`/api/items/${id}/check`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({checked:newChecked})})
  ));
}

function rerenderRoomProgress(){
  const allGrouped=groupItems(items.filter(i=>!i.is_extra));
  const notTransferGroups=allGrouped.filter(g=>g.isNotTransferring);
  const categoryGrouped=allGrouped.filter(g=>!g.isNotTransferring);

  if(notTransferGroups.length){
    const card=document.getElementById('room-not_transferring');
    if(card){
      const ntItems=notTransferGroups.flatMap(g=>g.items);
      const checked=ntItems.filter(i=>i.checked).length,total=ntItems.length,done=checked===total&&total>0;
      const r=20,circ=2*Math.PI*r,offset=circ*(1-(total?checked/total:0));
      const rf=card.querySelector('.ring-fill'),rt=card.querySelector('.ring-txt');
      if(rf)rf.setAttribute('stroke-dashoffset',offset.toFixed(1));
      if(rt)rt.innerHTML=done?'<span class="ring-done-icon">✓</span>':`${checked}/${total}`;
      if(done)card.classList.add('done');else card.classList.remove('done');
    }
  }

  const catMap={};
  for(const grp of categoryGrouped){if(!catMap[grp.category])catMap[grp.category]=[];catMap[grp.category].push(grp);}

  for(const[cat,groups] of Object.entries(catMap)){
    const key=cat.replace(/[^a-zA-Z0-9]/g,'_');
    const card=document.getElementById('room-'+key);if(!card)continue;
    const catItems=groups.flatMap(g=>g.items);
    const loadable=catItems.filter(i=>!i.is_transfer_item);
    const checked=loadable.filter(i=>i.checked).length,total=loadable.length,done=checked===total&&total>0;
    const r=20,circ=2*Math.PI*r,offset=circ*(1-(total?checked/total:0));
    const rf=card.querySelector('.ring-fill'),rt=card.querySelector('.ring-txt');
    if(rf)rf.setAttribute('stroke-dashoffset',offset.toFixed(1));
    if(rt)rt.innerHTML=done?'<span class="ring-done-icon">✓</span>':`${checked}/${total}`;
    if(done)card.classList.add('done');else card.classList.remove('done');
  }
}

function updateProgress(){
  const loadable=items.filter(i=>!i.is_transfer_item);
  const total=loadable.length,checked=loadable.filter(i=>i.checked).length,pct=total?Math.round(checked/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=`${checked} / ${total}`;
  const allDone=total>0&&checked===total;
  document.getElementById('done-banner').classList.toggle('show',allDone&&job.status==='loading');
}

async function setStatus(newStatus){
  const truck=document.getElementById('truck-input').value.trim();
  await fetch(`/api/jobs/${job.id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus,truck:truck||job.truck||''})});
  // The backend auto-archives jobs marked "returned" — mirror that locally
  job.status=(newStatus==='returned')?'archived':newStatus;
  if(truck)job.truck=truck;renderStatusBar();
}

async function saveTruck(){
  const truck=document.getElementById('truck-input').value.trim();if(!truck)return;
  await fetch(`/api/jobs/${job.id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:job.status,truck})});
  job.truck=truck;const btn=document.querySelector('.truck-save');
  btn.textContent='Saved ✓';setTimeout(()=>btn.textContent='Save',1500);
}

async function finishLoading(){
  const loadable=items.filter(i=>!i.is_transfer_item);
  const checked=loadable.filter(i=>i.checked).length,total=loadable.length;
  if(checked<total){if(!confirm(`${total-checked} items not checked off. Mark as loaded anyway?`))return;}
  await setStatus('loaded');
}

loadJob();
</script>
</body>
</html>
