<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMA Design Co — Jobs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF8F4;--warm:#F2EDE4;--sand:#E5DDD0;--border:#D8CFBF;--muted:#9A8F80;--ink:#1A1714;--accent:#B8935A;--green:#4A7C59;--red:#A63D2F;--blue:#4A7EB8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Jost',sans-serif;font-weight:400;font-size:18px;min-height:100vh;}

header{background:var(--ink);padding:22px 32px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;letter-spacing:0.12em;color:#FAF8F4;}
.logo em{font-style:italic;color:var(--accent);}
.nav-links{display:flex;gap:24px;}
.nav-link{color:rgba(250,248,244,0.45);text-decoration:none;font-size:0.8rem;letter-spacing:0.14em;text-transform:uppercase;transition:color 0.2s;}
.nav-link:hover,.nav-link.active{color:var(--accent);}

.main{max-width:1100px;margin:0 auto;padding:36px 24px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;margin-bottom:4px;}
.page-sub{font-size:0.9rem;color:var(--muted);margin-bottom:0;}

.pill{display:inline-block;padding:5px 14px;border-radius:1px;font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;}
.pill-ready{background:rgba(74,126,184,0.12);color:var(--blue);}
.pill-picking{background:rgba(232,197,71,0.15);color:#B8972A;}
.pill-readyload{background:rgba(184,147,90,0.15);color:var(--accent);}
.pill-loading{background:rgba(232,92,71,0.12);color:var(--red);}
.pill-loaded{background:rgba(74,124,89,0.12);color:var(--green);}
.pill-installed{background:rgba(74,124,89,0.2);color:var(--green);font-weight:700;}
.pill-archived{background:rgba(155,150,145,0.12);color:var(--muted);}

.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px;}
.job-card{background:white;border:1px solid var(--border);border-radius:2px;overflow:hidden;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s;}
.job-card:hover{border-color:var(--accent);box-shadow:0 4px 24px rgba(0,0,0,0.07);}
.job-card-top{padding:22px;display:flex;align-items:flex-start;gap:14px;}
.colour-swatch{width:10px;align-self:stretch;border-radius:1px;min-height:70px;flex-shrink:0;}
.job-info{flex:1;min-width:0;}
.job-ref-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;}
.job-ref{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;color:var(--accent);line-height:1;}
.job-address{font-size:1rem;color:var(--ink);margin-top:4px;}
.job-meta{font-size:0.85rem;color:var(--muted);margin-top:6px;display:flex;gap:16px;flex-wrap:wrap;line-height:1.7;}

/* Role modal */
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,0.5);z-index:100;}
.panel-overlay.open{display:block;}
.role-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.95);background:white;border-radius:3px;z-index:102;width:calc(100% - 40px);max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,0.18);opacity:0;pointer-events:none;transition:all 0.2s ease;}
.role-modal.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1);}
.role-modal-header{padding:24px 28px 18px;border-bottom:1px solid var(--border);position:relative;}
.role-job-ref{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;color:var(--accent);line-height:1;}
.role-job-addr{font-size:0.9rem;color:var(--muted);margin-top:4px;}
.role-close{position:absolute;top:18px;right:20px;background:none;border:none;font-size:1.3rem;color:var(--muted);cursor:pointer;padding:4px;}
.role-btns{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.role-btn{background:none;border:none;padding:34px 24px;cursor:pointer;text-align:center;transition:background 0.15s;border-top:1px solid var(--border);}
.role-btn:first-child{border-right:1px solid var(--border);}
.role-btn:hover{background:var(--warm);}
.role-btn:active{background:var(--sand);}
.role-label{font-size:1.3rem;font-weight:600;color:var(--ink);margin-bottom:6px;font-family:'Jost',sans-serif;letter-spacing:0.04em;}
.role-sub{font-size:0.82rem;color:var(--muted);}

/* Stylist panel */
.panel{position:fixed;right:0;top:0;bottom:0;width:100%;max-width:600px;background:white;z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s ease;}
.panel.open{transform:translateX(0);}
.panel-header{padding:22px 28px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;flex-shrink:0;}
.panel-close{background:none;border:none;font-size:1.6rem;color:var(--muted);cursor:pointer;padding:4px;margin-top:2px;}
.panel-title{flex:1;}
.panel-job-ref{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:400;color:var(--accent);}
.panel-address{font-size:0.95rem;color:var(--muted);margin-top:3px;}
.panel-owner{font-size:0.9rem;color:var(--ink);margin-top:3px;font-weight:500;}
.panel-actions{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;align-items:center;}
.btn{padding:12px 20px;border-radius:1px;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:0.82rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-gold{background:var(--accent);color:white;}
.btn-gold:hover{background:#a07840;}
.btn-green{background:rgba(74,124,89,0.1);color:var(--green);border:1px solid rgba(74,124,89,0.3);}
.btn-green:hover{background:rgba(74,124,89,0.2);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--ink);}
.btn-outline:hover{border-color:var(--ink);}
.driver-link{font-size:0.8rem;color:var(--muted);}
.driver-link a{color:var(--accent);text-decoration:none;font-weight:500;}
.driver-link a:hover{text-decoration:underline;}
.panel-body{flex:1;overflow-y:auto;padding:20px 28px;}

.room-section{margin-bottom:26px;}
.room-header{font-size:0.8rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--sand);}
.item-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--sand);flex-wrap:wrap;}
.item-row:last-child{border-bottom:none;}
.pick-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;font-size:1rem;color:transparent;margin-top:2px;}
.pick-btn.picked{background:var(--green);border-color:var(--green);color:white;}
.item-serial{font-size:0.88rem;font-weight:600;color:var(--accent);min-width:44px;margin-top:6px;}
.item-desc{flex:1;font-size:1.05rem;line-height:1.5;margin-top:4px;}
.item-picked .item-desc{text-decoration:line-through;opacity:0.45;}
.item-del{background:none;border:none;color:var(--border);cursor:pointer;font-size:1.1rem;padding:4px;transition:color 0.15s;flex-shrink:0;margin-top:2px;}
.item-del:hover{color:var(--red);}
.item-notes{width:100%;background:none;border:none;border-top:1px dashed var(--sand);padding:8px 0 4px;font-family:'Jost',sans-serif;font-size:0.9rem;color:var(--muted);outline:none;resize:none;margin-top:8px;margin-left:48px;}
.item-notes:focus{color:var(--ink);border-top-color:var(--accent);}
.item-notes::placeholder{color:var(--border);}

.add-item-row{display:flex;gap:10px;margin-top:14px;}
.add-input{flex:1;background:var(--warm);border:1px solid var(--border);border-radius:1px;padding:12px 14px;font-family:'Jost',sans-serif;font-size:1rem;color:var(--ink);outline:none;}
.add-input:focus{border-color:var(--accent);}
.room-select{background:var(--warm);border:1px solid var(--border);border-radius:1px;padding:12px;font-family:'Jost',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;}

.loading{text-align:center;padding:60px;color:var(--muted);font-size:1rem;}
.empty{text-align:center;padding:60px 24px;}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--muted);margin-bottom:8px;}
.empty-sub{font-size:0.9rem;color:var(--muted);}
footer{border-top:1px solid var(--border);padding:18px 32px;text-align:center;font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;}
</style>
</head>
<body>
<header>
  <div class="logo">LUMA <em>Design</em> Co</div>
  <div class="nav-links">
    <a href="/" class="nav-link">Labels</a>
    <a href="/jobs" class="nav-link active">Jobs</a>
  </div>
</header>
<div class="main">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
    <div>
      <div class="page-title">Active Jobs</div>
      <div class="page-sub">Click a job to manage items and update status</div>
    </div>
    <button class="btn btn-outline" id="archived-toggle" onclick="toggleArchived()" style="font-size:0.75rem;">Show Archived</button>
  </div>
  <div class="jobs-grid" id="jobs-grid"><div class="loading">Loading jobs…</div></div>
</div>

<!-- Role modal -->
<div class="panel-overlay" id="role-overlay" onclick="closeRole()"></div>
<div class="role-modal" id="role-modal">
  <div class="role-modal-header">
    <div class="role-job-ref" id="role-ref"></div>
    <div class="role-job-addr" id="role-addr"></div>
    <button class="role-close" onclick="closeRole()">✕</button>
  </div>
  <div class="role-btns">
    <button class="role-btn" onclick="openAsStylist()">
      <div class="role-label">Stylist</div>
      <div class="role-sub">Pick items & manage job</div>
    </button>
    <button class="role-btn" onclick="openAsDriver()">
      <div class="role-label">Driver</div>
      <div class="role-sub">Load truck & check items</div>
    </button>
  </div>
</div>

<!-- Stylist panel -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">←</button>
    <div class="panel-title">
      <div class="panel-job-ref" id="panel-ref"></div>
      <div class="panel-address" id="panel-address"></div>
      <div class="panel-owner" id="panel-owner"></div>
    </div>
    <div id="panel-status-badge"></div>
  </div>
  <div class="panel-actions" id="panel-actions"></div>
  <div class="panel-body" id="panel-body"><div class="loading">Loading…</div></div>
</div>

<footer>LUMA Design Co · Warehouse Operations · lumadesignco.com.au</footer>

<script>
let currentJob=null,allItems=[],showArchived=false,pendingJobId=null;
const COLOUR_MAP={Red:'#E85C47',Blue:'#4A9EE8',Green:'#4CAF7D',Yellow:'#E8C547',Purple:'#A04AE8',Orange:'#E87E47',Pink:'#E84A9E'};
const STATUS_LABELS={ready:'Job Assigned',picking:'Picking',ready_to_load:'Ready to Load',loading:'Loading',loaded:'Loaded',installed:'Installed',archived:'Archived'};
const STATUS_PILLS={ready:'pill-ready',picking:'pill-picking',ready_to_load:'pill-readyload',loading:'pill-loading',loaded:'pill-loaded',installed:'pill-installed',archived:'pill-archived'};

function toggleArchived(){
  showArchived=!showArchived;
  const btn=document.getElementById('archived-toggle');
  btn.textContent=showArchived?'Hide Archived':'Show Archived';
  btn.style.color=showArchived?'var(--accent)':'';
  btn.style.borderColor=showArchived?'var(--accent)':'';
  loadJobs();
}

async function loadJobs(){
  const res=await fetch('/api/jobs');
  const allJobs=await res.json();
  const jobs=showArchived?allJobs:allJobs.filter(j=>j.status!=='archived');
  const grid=document.getElementById('jobs-grid');
  if(!jobs.length){
    const msg=showArchived?'No jobs found':'No active jobs';
    grid.innerHTML=`<div class="empty"><div class="empty-title">No jobs yet</div><div class="empty-sub">${msg}</div></div>`;
    return;
  }
  grid.innerHTML=jobs.map(job=>{
    const colour=COLOUR_MAP[job.colour]||'#888';
    const pill=STATUS_PILLS[job.status]||'pill-ready',label=STATUS_LABELS[job.status]||job.status;
    const truck=job.truck?`${job.truck}`:'',owner=job.job_owner?`${job.job_owner}`:'';
    return `<div class="job-card" onclick="openJob('${job.id}')">
      <div class="job-card-top">
        <div class="colour-swatch" style="background:${colour}"></div>
        <div class="job-info">
          <div class="job-ref-row">
            <div class="job-ref">${job.job_ref||job.job_number}</div>
            <span class="pill ${pill}">${label}</span>
          </div>
          <div class="job-address">${job.address}</div>
          <div class="job-meta">
            ${job.stage_date?`<span>${job.stage_date}</span>`:''}
            <span>${job.item_count} items</span>
            ${owner?`<span>${owner}</span>`:''}
            ${truck?`<span>${truck}</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function openJob(jobId){
  pendingJobId=jobId;
  const res=await fetch(`/api/jobs/${jobId}`);
  const data=await res.json();
  currentJob=data.job;allItems=data.items;
  document.getElementById('role-ref').textContent=currentJob.job_ref||currentJob.job_number;
  document.getElementById('role-addr').textContent=currentJob.address+' · '+currentJob.stage_date;
  document.getElementById('role-overlay').classList.add('open');
  document.getElementById('role-modal').classList.add('open');
}

function closeRole(){
  document.getElementById('role-overlay').classList.remove('open');
  document.getElementById('role-modal').classList.remove('open');
  pendingJobId=null;
}

function openAsStylist(){
  closeRole();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-body').innerHTML='<div class="loading">Loading…</div>';
  document.getElementById('panel-ref').textContent=currentJob.job_ref||currentJob.job_number;
  document.getElementById('panel-address').textContent=currentJob.address+' · '+currentJob.stage_date;
  document.getElementById('panel-owner').textContent=currentJob.job_owner?currentJob.job_owner:'';
  renderStatus();renderPanelItems();
}

function openAsDriver(){
  closeRole();
  window.open(`/driver/${currentJob.id}`,'_blank');
}

function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  currentJob=null;loadJobs();
}

function renderStatus(){
  const s=currentJob.status;
  document.getElementById('panel-status-badge').innerHTML=`<span class="pill ${STATUS_PILLS[s]||'pill-ready'}">${STATUS_LABELS[s]||s}</span>`;
  const truck=currentJob.truck?` · ${currentJob.truck}`:'';
  let btns='';
  if(s==='ready') btns=`<button class="btn btn-gold" onclick="setStatus('picking')">Start Picking</button>`;
  else if(s==='picking') btns=`<button class="btn btn-green" onclick="setStatus('ready_to_load')">Picking Complete</button>`;
  else if(s==='ready_to_load') btns=`<span style="font-size:0.88rem;color:var(--muted);">Waiting for driver</span>`;
  else if(s==='loading') btns=`<span style="font-size:0.88rem;color:var(--red);">Driver is loading…</span>`;
  else if(s==='loaded') btns=`<span style="font-size:0.88rem;color:var(--green);font-weight:500;">Truck loaded</span>`;
  else if(s==='installed') btns=`<span style="font-size:0.88rem;color:var(--green);font-weight:600;">Installed</span>`;
  else if(s==='archived') btns=`<button class="btn btn-outline" onclick="setStatus('ready')">Restore Job</button>`;
  const archiveBtn=s!=='archived'?`<button class="btn btn-outline" onclick="archiveJob()" style="color:var(--muted);font-size:0.72rem;">Archive</button>`:'';
  document.getElementById('panel-actions').innerHTML=`
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;width:100%;">
      ${btns}
      <div class="driver-link" style="margin-left:auto;">Driver: <a href="/driver/${currentJob.id}" target="_blank">open →</a>${truck}</div>
      ${archiveBtn}
    </div>`;
}

async function setStatus(s){
  await fetch(`/api/jobs/${currentJob.id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})});
  currentJob.status=s;renderStatus();
}

async function archiveJob(){
  if(!confirm('Archive this job? It will be hidden from the main view but can be restored.'))return;
  await setStatus('archived');closePanel();
}

function toggleRoom(el){
  const section=el.closest('.room-section');
  const items=section.querySelector('.room-items');
  const chevron=el.querySelector('.room-chevron');
  items.classList.toggle('collapsed');
  chevron.classList.toggle('collapsed');
}

function renderPanelItems(){
  const body=document.getElementById('panel-body');
  const regular=allItems.filter(i=>!i.is_extra),extras=allItems.filter(i=>i.is_extra);
  const rooms={};
  for(const item of regular){if(!rooms[item.room])rooms[item.room]=[];rooms[item.room].push(item);}
  let html='';
  for(const[room,items] of Object.entries(rooms)){
    const picked=items.filter(i=>i.picked).length;
    html+=`<div class="room-section">
      <div class="room-header" onclick="toggleRoom(this)">
        <div class="room-header-left">
          <span>${room||'Uncategorised'}</span>
          <span class="room-count">${picked}/${items.length} picked</span>
        </div>
        <span class="room-chevron">▼</span>
      </div>
      <div class="room-items">${items.map(itemRow).join('')}</div>
    </div>`;
  }
  if(extras.length){
    html+=`<div class="room-section">
      <div class="room-header" onclick="toggleRoom(this)">
        <div class="room-header-left"><span>Extras</span><span class="room-count">${extras.length} items</span></div>
        <span class="room-chevron">▼</span>
      </div>
      <div class="room-items">${extras.map(itemRow).join('')}</div>
    </div>`;
  }
  const rooms_list=[...new Set(allItems.map(i=>i.room).filter(r=>r))];
  html+=`<div class="room-section" style="margin-top:28px"><div class="room-header">Add Item</div>
    <div class="add-item-row">
      <select class="room-select" id="new-room">${rooms_list.map(r=>`<option>${r}</option>`).join('')}<option value="">— Extra</option></select>
      <input class="add-input" id="new-desc" placeholder="Item description" onkeydown="if(event.key==='Enter')addItem()"/>
      <button class="btn btn-gold" onclick="addItem()">Add</button>
    </div></div>`;
  body.innerHTML=html;
}

function itemRow(item){
  const notes=item.notes||'',picked=item.picked||false;
  return `<div class="${picked?'item-row item-picked':'item-row'}" id="item-${item.id}">
    <button class="${picked?'pick-btn picked':'pick-btn'}" id="pick-${item.id}" onclick="togglePicked('${item.id}')">✓</button>
    <div class="item-serial">#${item.serial}</div>
    <div class="item-desc">${item.description||'<span style="color:var(--muted);font-style:italic">blank extra</span>'}</div>
    <button class="item-del" onclick="deleteItem('${item.id}')">✕</button>
    <textarea class="item-notes" rows="1" placeholder="Add note for driver…"
      onblur="saveNote('${item.id}',this.value)"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
    >${notes}</textarea></div>`;
}

async function togglePicked(itemId){
  const item=allItems.find(i=>i.id===itemId);if(!item)return;
  item.picked=!item.picked;
  const row=document.getElementById('item-'+itemId),btn=document.getElementById('pick-'+itemId);
  if(item.picked){row.classList.add('item-picked');btn.classList.add('picked');}
  else{row.classList.remove('item-picked');btn.classList.remove('picked');}
  await fetch('/api/items/'+itemId+'/check',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({picked:item.picked})});
}

async function saveNote(itemId,notes){
  await fetch('/api/items/'+itemId+'/check',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes})});
  const item=allItems.find(i=>i.id===itemId);if(item)item.notes=notes;
}

async function deleteItem(itemId){
  await fetch(`/api/items/${itemId}`,{method:'DELETE'});
  allItems=allItems.filter(i=>i.id!==itemId);renderPanelItems();
}

async function addItem(){
  const desc=document.getElementById('new-desc').value.trim(),room=document.getElementById('new-room').value;
  if(!desc)return;
  const lastSerial=allItems.length?Math.max(...allItems.map(i=>parseInt(i.serial)||0)):0;
  const newSerial=String(lastSerial+1).padStart(3,'0');
  const res=await fetch(`/api/jobs/${currentJob.id}/items`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({serial:newSerial,room,description:desc,is_extra:!room})});
  const newItem=await res.json();
  allItems.push(newItem);document.getElementById('new-desc').value='';renderPanelItems();
}

loadJobs();
</script>
</body>
</html>
