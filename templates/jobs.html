<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMA Design Co — Jobs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF8F4;--warm:#F2EDE4;--sand:#E5DDD0;--border:#D8CFBF;--muted:#9A8F80;--ink:#1A1714;--accent:#B8935A;--green:#4A7C59;--red:#A63D2F;--blue:#4A7EB8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Jost',sans-serif;font-weight:400;font-size:18px;min-height:100vh;}

header{background:var(--ink);padding:22px 32px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;letter-spacing:0.12em;color:#FAF8F4;}
.logo em{font-style:italic;color:var(--accent);}
.nav-links{display:flex;gap:24px;}
.nav-link{color:rgba(250,248,244,0.45);text-decoration:none;font-size:0.8rem;letter-spacing:0.14em;text-transform:uppercase;transition:color 0.2s;}
.nav-link:hover,.nav-link.active{color:var(--accent);}

.main{max-width:1100px;margin:0 auto;padding:36px 24px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;margin-bottom:4px;}
.page-sub{font-size:0.9rem;color:var(--muted);margin-bottom:0;}

.search-bar{display:flex;align-items:center;gap:10px;background:white;border:1px solid var(--border);border-radius:2px;padding:11px 16px;margin-bottom:24px;transition:border-color 0.15s;}
.search-bar:focus-within{border-color:var(--accent);}
.search-bar svg{color:var(--muted);flex-shrink:0;}
.search-bar input{flex:1;border:none;outline:none;font-family:'Jost',sans-serif;font-size:0.95rem;color:var(--ink);background:none;}
.search-bar input::placeholder{color:var(--muted);}
#search-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.9rem;padding:2px 6px;display:flex;align-items:center;border-radius:50%;transition:background 0.15s,color 0.15s;}
#search-clear:hover{background:var(--warm);color:var(--ink);}

.pill{display:inline-block;padding:5px 14px;border-radius:1px;font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;}
.pill-ready{background:rgba(74,126,184,0.12);color:var(--blue);}
.pill-picking{background:rgba(232,197,71,0.15);color:#B8972A;}
.pill-readyload{background:rgba(184,147,90,0.15);color:var(--accent);}
.pill-loading{background:rgba(232,92,71,0.12);color:var(--red);}
.pill-loaded{background:rgba(74,124,89,0.12);color:var(--green);}
.pill-installed{background:rgba(74,124,89,0.2);color:var(--green);font-weight:700;}
.pill-readycollect{background:rgba(106,13,173,0.12);color:#6A0DAD;font-weight:700;}
.pill-returned{background:rgba(21,101,192,0.15);color:#1565C0;font-weight:700;}
.pill-archived{background:rgba(155,150,145,0.12);color:var(--muted);}

.jobs-grid{display:flex;flex-direction:column;gap:28px;}
.status-section{}
.status-section-header{font-size:0.75rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.status-section-count{background:var(--sand);color:var(--ink);border-radius:10px;padding:1px 9px;font-size:0.7rem;font-weight:600;}
.jobs-grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px;}
.job-card{background:white;border:1px solid var(--border);border-radius:2px;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;}
.job-card:hover{border-color:var(--accent);box-shadow:0 4px 24px rgba(0,0,0,0.07);}
.job-card-top{padding:22px;display:flex;align-items:flex-start;gap:14px;}
.job-card-actions{display:flex;border-top:1px solid var(--border);}
.job-action-btn{flex:1;padding:13px;background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:0.78rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:7px;transition:background 0.15s;border-right:1px solid var(--border);}
.job-action-btn:last-child{border-right:none;}
.job-action-runsheet{flex:0 0 48px;color:var(--green);}
.job-action-runsheet:hover{background:rgba(74,124,89,0.08);}
.job-action-stylist{color:var(--accent);}
.job-action-stylist:hover{background:rgba(184,147,90,0.08);}
.job-action-driver{color:var(--blue);}
.job-action-driver:hover{background:rgba(74,126,184,0.08);}
.colour-swatch{width:10px;align-self:stretch;border-radius:1px;min-height:70px;flex-shrink:0;}
.job-info{flex:1;min-width:0;}
.job-ref-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;}
.job-ref{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;color:var(--accent);line-height:1;}
.transfer-tag{font-family:'Jost',sans-serif;font-size:0.75rem;font-weight:600;color:var(--blue);letter-spacing:0.04em;margin-left:6px;}
.transfer-tag-out{color:var(--accent);}
.transfer-tag-link{color:var(--blue);text-decoration:underline;font-weight:700;}
.transfer-tag-link:hover{color:var(--ink);}
.transfer-tag-link-out{color:var(--accent);}
.job-address{font-size:1rem;color:var(--ink);margin-top:4px;}
.assignment-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.assignment-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.78rem;font-weight:600;padding:4px 10px;border-radius:10px;}
.assignment-badge-owner{background:rgba(184,147,90,0.12);color:var(--accent);}
.assignment-badge-truck{background:rgba(74,126,184,0.12);color:var(--blue);}
.assignment-badge-runsheet{background:rgba(74,124,89,0.12);color:var(--green);}

/* ── VIEW TABS ── */
.view-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.view-tab{background:none;border:none;padding:10px 18px;font-family:'Jost',sans-serif;font-size:0.85rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;}
.view-tab:hover{color:var(--ink);}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* ── RUNSHEET ── */
.runsheet-date-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.runsheet-nav-btn{background:white;border:1px solid var(--border);border-radius:2px;width:32px;height:32px;font-size:1.1rem;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s;}
.runsheet-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.runsheet-date-label{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--ink);min-width:200px;text-align:center;}
.runsheet-section{margin-bottom:28px;}
.runsheet-section-title{font-size:0.75rem;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.runsheet-section-title .count{background:var(--sand);color:var(--ink);border-radius:10px;padding:1px 8px;font-size:0.7rem;}
.runsheet-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:0.9rem;background:white;border:1px dashed var(--border);border-radius:3px;}

/* ── RUNSHEET TIMELINE ── */
.runsheet-unscheduled{background:rgba(184,147,90,0.07);border:1px dashed var(--accent);border-radius:3px;padding:14px 16px;margin-bottom:20px;}
.runsheet-unscheduled-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
.runsheet-unscheduled .runsheet-timeline-card{width:260px;}

.runsheet-timeline{background:white;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.runsheet-timeline-row{display:flex;border-bottom:1px solid var(--sand);min-height:52px;}
.runsheet-timeline-row:last-child{border-bottom:none;}
.runsheet-timeline-row.has-jobs{background:rgba(184,147,90,0.04);}
.runsheet-timeline-time{flex:0 0 76px;padding:12px 10px;font-size:0.78rem;font-weight:600;color:var(--muted);border-right:1px solid var(--sand);display:flex;align-items:center;}
.runsheet-timeline-row.has-jobs .runsheet-timeline-time{color:var(--ink);}
.runsheet-timeline-cards{flex:1;padding:8px 10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}

.runsheet-timeline-card{display:flex;align-items:stretch;gap:9px;background:var(--warm);border:1px solid var(--border);border-radius:3px;padding:7px 11px 7px 0;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;max-width:280px;}
.runsheet-timeline-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.runsheet-card-colour{width:5px;border-radius:2px;flex-shrink:0;}
.runsheet-card-info{min-width:0;}
.runsheet-card-top{display:flex;align-items:center;gap:7px;}
.runsheet-card-ref{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--accent);line-height:1;}
.runsheet-card-type{font-size:0.62rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:1px 6px;border-radius:8px;background:rgba(74,124,89,0.15);color:var(--green);}
.runsheet-card-install .runsheet-card-type{background:rgba(74,124,89,0.15);color:var(--green);}
.runsheet-card-pickup .runsheet-card-type{background:rgba(74,126,184,0.15);color:var(--blue);}
.runsheet-card-toload .runsheet-card-type{background:rgba(184,147,90,0.18);color:var(--accent);}
.runsheet-card-addr{font-size:0.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}

/* ── ADD TO RUNSHEET POPOVER ── */
.runsheet-popover-overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,0.35);z-index:200;}
.runsheet-popover-overlay.open{display:block;}
.runsheet-popover{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:4px;box-shadow:0 12px 40px rgba(0,0,0,0.2);padding:22px;width:320px;z-index:201;}
.runsheet-popover.open{display:block;}
.runsheet-popover-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;margin-bottom:14px;color:var(--ink);}
.runsheet-popover-label{display:block;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px;margin-top:12px;}
.runsheet-popover-input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:2px;font-family:'Jost',sans-serif;font-size:0.92rem;color:var(--ink);outline:none;}
.runsheet-popover-input:focus{border-color:var(--accent);}
.runsheet-popover-type-row{display:flex;gap:8px;}
.runsheet-type-btn{flex:1;padding:9px;border:1px solid var(--border);border-radius:2px;background:white;font-family:'Jost',sans-serif;font-size:0.85rem;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.runsheet-type-btn.selected{border-color:var(--accent);background:rgba(184,147,90,0.1);color:var(--accent);font-weight:600;}
.runsheet-popover-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:8px;}
.job-meta{font-size:0.85rem;color:var(--muted);margin-top:6px;display:flex;gap:16px;flex-wrap:wrap;line-height:1.7;}
.eta-tag{font-weight:600;}
.eta-tag-truck{color:var(--blue);}
.eta-tag-stylist{color:var(--accent);}

.btn{padding:12px 20px;border-radius:1px;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:0.82rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--ink);}
.btn-outline:hover{border-color:var(--ink);}

.loading{text-align:center;padding:60px;color:var(--muted);font-size:1rem;}
.empty{text-align:center;padding:60px 24px;}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--muted);margin-bottom:8px;}
.empty-sub{font-size:0.9rem;color:var(--muted);}
footer{border-top:1px solid var(--border);padding:18px 32px;text-align:center;font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;}
</style>
</head>
<body>
<header>
  <div class="logo">LUMA <em>Design</em> Co</div>
  <div class="nav-links">
    <a href="/" class="nav-link">Labels</a>
    <a href="/jobs" class="nav-link active">Jobs</a>
  </div>
</header>
<div class="main">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:14px;">
    <div>
      <div class="page-title" id="page-title">Active Jobs</div>
      <div class="page-sub" id="page-sub">Click a job to manage items and update status</div>
    </div>
    <button class="btn btn-outline" id="archived-toggle" onclick="toggleArchived()" style="font-size:0.75rem;">Show Completed Jobs</button>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" id="tab-active" onclick="switchView('active')">Active Jobs</button>
    <button class="view-tab" id="tab-runsheet" onclick="switchView('runsheet')">Runsheet</button>
  </div>

  <div id="active-view">
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="job-search" placeholder="Search by job number or address…" oninput="handleSearchInput(this.value)" />
      <button id="search-clear" onclick="clearSearch()" style="display:none;">✕</button>
    </div>
    <div class="jobs-grid" id="jobs-grid"><div class="loading">Loading jobs…</div></div>
  </div>

  <div id="runsheet-view" style="display:none;">
    <div class="runsheet-date-row">
      <button class="runsheet-nav-btn" onclick="shiftRunsheetDate(-1)">‹</button>
      <div class="runsheet-date-label" id="runsheet-date-label"></div>
      <button class="runsheet-nav-btn" onclick="shiftRunsheetDate(1)">›</button>
      <button class="btn btn-outline" onclick="goToToday()" style="font-size:0.72rem;margin-left:10px;">Today</button>
    </div>
    <div id="runsheet-content"><div class="loading">Loading runsheet…</div></div>
  </div>
</div>

<!-- Add to Runsheet popover -->
<div class="runsheet-popover-overlay" id="runsheet-popover-overlay" onclick="closeRunsheetPopover()"></div>
<div class="runsheet-popover" id="runsheet-popover">
  <div class="runsheet-popover-title">Add to Runsheet</div>
  <label class="runsheet-popover-label">Date</label>
  <input type="date" id="runsheet-popover-date" class="runsheet-popover-input"/>
  <label class="runsheet-popover-label">Type</label>
  <div class="runsheet-popover-type-row">
    <button class="runsheet-type-btn" id="runsheet-type-install" onclick="selectRunsheetType('install')">Install</button>
    <button class="runsheet-type-btn" id="runsheet-type-pickup" onclick="selectRunsheetType('pickup')">Pickup</button>
    <button class="runsheet-type-btn" id="runsheet-type-to_load" onclick="selectRunsheetType('to_load')">To Load</button>
  </div>
  <label class="runsheet-popover-label">Time <span style="text-transform:none;font-weight:400;color:var(--muted);">(optional)</span></label>
  <select id="runsheet-popover-time" class="runsheet-popover-input">
    <option value="">No specific time yet</option>
  </select>
  <div class="runsheet-popover-actions">
    <button class="btn btn-outline" onclick="removeFromRunsheet()" id="runsheet-remove-btn" style="font-size:0.72rem;display:none;">Remove from Runsheet</button>
    <button class="btn btn-gold" onclick="saveRunsheetEntry()">Save</button>
  </div>
</div>

<footer>LUMA Design Co · Warehouse Operations · lumadesignco.com.au</footer>

<script>
let showArchived=false;
const COLOUR_MAP={Red:'#D62828',Blue:'#1565C0',Green:'#2E7D32',Yellow:'#F9A825',Purple:'#6A0DAD',Orange:'#E65100',Teal:'#00838F',Magenta:'#AD1457',Brown:'#4E342E',Olive:'#558B2F',Indigo:'#283593',Cyan:'#00ACC1',Pink:'#F06292',Grey:'#757575'};
const STATUS_LABELS={ready:'Ready to Pick',picking:'Picking',ready_to_load:'Ready to Load',loading:'Loading',loaded:'Loaded',installed:'Installed',ready_to_collect:'Ready to Collect',archived:'Returned'};
const STATUS_PILLS={ready:'pill-ready',picking:'pill-picking',ready_to_load:'pill-readyload',loading:'pill-loading',loaded:'pill-loaded',installed:'pill-installed',ready_to_collect:'pill-readycollect',archived:'pill-returned'};

function toggleArchived(){
  showArchived=!showArchived;
  const btn=document.getElementById('archived-toggle');
  btn.textContent=showArchived?'Hide Completed Jobs':'Show Completed Jobs';
  btn.style.color=showArchived?'var(--accent)':'';
  btn.style.borderColor=showArchived?'var(--accent)':'';
  renderJobs();
}

// Status display order — strict order of execution, matching the
// actual job lifecycle from start to finish.
const STATUS_ORDER=['ready','picking','ready_to_load','loading','loaded','installed','ready_to_collect'];
const STATUS_SECTION_LABELS={
  ready:'Ready to Pick', picking:'Picking', ready_to_load:'Ready to Load',
  loading:'Loading', loaded:'Loaded', installed:'Installed', ready_to_collect:'Ready to Collect'
};

const MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function parseStageDate(s){
  if(!s)return 0;
  const parts=s.trim().split(/\s+/);
  if(parts.length===3){
    const d=parseInt(parts[0]),m=MONTHS[parts[1].toLowerCase().slice(0,3)],y=parseInt(parts[2]);
    if(!isNaN(d)&&m!==undefined&&!isNaN(y)) return new Date(y,m,d).getTime();
  }
  const fallback=new Date(s);
  return isNaN(fallback)?0:fallback.getTime();
}

const RUNSHEET_TYPE_LABELS={install:'Install', pickup:'Pickup', to_load:'To Load'};

function jobCardHTML(job){
  const colour=COLOUR_MAP[job.colour]||'#888';
  const pill=STATUS_PILLS[job.status]||'pill-ready',label=STATUS_LABELS[job.status]||job.status;
  const ownerIcon=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.71 4.04c.39-.39.39-1.05 0-1.44l-2.31-2.31a.996.996 0 0 0-1.41 0L15.13 2.16l3.71 3.71M3 17.25V21h3.75L20.81 6.94l-3.75-3.75z"/></svg>`;
  const truckIcon=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="1.5"/><circle cx="18.5" cy="18.5" r="1.5"/></svg>`;
  const ownerBadge=job.job_owner?`<span class="assignment-badge assignment-badge-owner">${ownerIcon}${job.job_owner}</span>`:'';
  const truckBadge=job.truck?`<span class="assignment-badge assignment-badge-truck">${truckIcon}${job.truck}</span>`:'';
  const runsheetBadge=job.runsheet_date?`<span class="assignment-badge assignment-badge-runsheet">${formatRunsheetBadgeDate(job.runsheet_date)} — ${RUNSHEET_TYPE_LABELS[job.runsheet_type]||job.runsheet_type}</span>`:'';
  let transferTag='';
  if(job.is_transfer){
    const src=job.transfer_from_job_id?jobsById.get(job.transfer_from_job_id):null;
    const linkText=src?(src.job_ref||src.job_number):'job';
    const link=src
      ? `<a href="/stylist/${src.id}" target="_blank" onclick="event.stopPropagation()" class="transfer-tag-link">${linkText}</a>`
      : `<span class="transfer-tag-link">${linkText}</span>`;
    transferTag=`<span class="transfer-tag">— Transfer From ${link}</span>`;
  } else if(transferringToMap.has(job.id)){
    const dest=transferringToMap.get(job.id);
    const linkText=dest.job_ref||dest.job_number;
    const link=`<a href="/stylist/${dest.id}" target="_blank" onclick="event.stopPropagation()" class="transfer-tag-link transfer-tag-link-out">${linkText}</a>`;
    transferTag=`<span class="transfer-tag transfer-tag-out">— Transferring To ${link}</span>`;
  }

  // ETA is only meaningful for a little while — if it's more than 30
  // minutes old, showing it without context would look like a current
  // estimate when it almost certainly isn't anymore. Truck and stylist
  // ETAs are fully independent — either, both, or neither can be present
  // depending on who's tapped their address link.
  function etaTagHTML(text, calculatedAt, icon, label, extraClass){
    if(!text || !calculatedAt) return '';
    const ageMinutes=(Date.now()-new Date(calculatedAt).getTime())/60000;
    if(ageMinutes>30) return '';
    const iconPart = icon ? `${icon} ` : '';
    return `<span class="eta-tag ${extraClass}" title="Calculated ${Math.round(ageMinutes)} min ago">${iconPart}${label} ${text}</span>`;
  }
  const truckEtaTag   = etaTagHTML(job.truck_eta_text,   job.truck_eta_calculated_at,   '🚛', 'Truck ETA',   'eta-tag-truck');
  const stylistEtaTag = etaTagHTML(job.stylist_eta_text, job.stylist_eta_calculated_at, '',   'Stylist ETA', 'eta-tag-stylist');

  return `<div class="job-card">
    <div class="job-card-top">
      <div class="colour-swatch" style="background:${colour}"></div>
      <div class="job-info">
        <div class="job-ref-row">
          <div class="job-ref">${job.job_ref||job.job_number}${transferTag}</div>
          <span class="pill ${pill}">${label}</span>
        </div>
        <div class="job-address">${job.address}</div>
        ${(ownerBadge||truckBadge||runsheetBadge)?`<div class="assignment-row">${ownerBadge}${truckBadge}${runsheetBadge}</div>`:''}
        <div class="job-meta">
          ${job.stage_date?`<span>${job.stage_date}</span>`:''}
          <span>${job.item_count} items</span>
          ${truckEtaTag}
          ${stylistEtaTag}
        </div>
      </div>
    </div>
    <div class="job-card-actions">
      <button class="job-action-btn job-action-runsheet" onclick="openRunsheetPopover('${job.id}', this)" title="Add to Runsheet">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </button>
      <button class="job-action-btn job-action-stylist" onclick="openAsStylist('${job.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.71 4.04c.39-.39.39-1.05 0-1.44l-2.31-2.31a.996.996 0 0 0-1.41 0L15.13 2.16l3.71 3.71M3 17.25V21h3.75L20.81 6.94l-3.75-3.75z"/></svg>
        Stylist
      </button>
      <button class="job-action-btn job-action-driver" onclick="openAsDriver('${job.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="1.5"/><circle cx="18.5" cy="18.5" r="1.5"/></svg>
        Driver
      </button>
    </div>
  </div>`;
}

function openAsStylist(jobId){
  window.open(`/stylist/${jobId}`,'_blank');
}

function openAsDriver(jobId){
  window.open(`/driver/${jobId}`,'_blank');
}

let lastFetchedJobs=[]; // cached so search can re-filter without refetching
let searchQuery='';
let jobsById=new Map(); // job id -> full job object, for quick lookup when rendering transfer links
let transferringToMap=new Map(); // source job id -> the job that's transferring from it
let runsheetTimeSlots=[]; // canonical slot list from the backend — keeps the dropdown in sync with what /runsheet will actually accept

async function loadRunsheetTimeSlots(){
  try{
    const res=await fetch('/api/runsheet-time-slots');
    runsheetTimeSlots=await res.json();
  }catch(e){
    runsheetTimeSlots=[];
  }
  const select=document.getElementById('runsheet-popover-time');
  const existing=select.value;
  select.innerHTML='<option value="">No specific time yet</option>'
    + runsheetTimeSlots.map(t=>`<option value="${t}">${formatTimeSlotLabel(t)}</option>`).join('');
  select.value=existing;
}
function formatTimeSlotLabel(t){
  // "09:00" -> "9:00am", "13:30" -> "1:30pm" — friendlier than 24hr for a quick glance
  const [h,m]=t.split(':').map(Number);
  const period=h<12?'am':'pm';
  const h12=h%12===0?12:h%12;
  return `${h12}:${String(m).padStart(2,'0')}${period}`;
}

async function loadJobs(){
  const res=await fetch('/api/jobs');
  lastFetchedJobs=await res.json();
  jobsById=new Map(lastFetchedJobs.map(j=>[j.id,j]));
  transferringToMap=new Map(
    lastFetchedJobs.filter(j=>j.is_transfer&&j.transfer_from_job_id).map(j=>[j.transfer_from_job_id,j])
  );
  renderJobs();
  if(currentView==='runsheet') renderRunsheet();
}

// ── View switching ──
let currentView='active';
function switchView(view){
  currentView=view;
  document.getElementById('tab-active').classList.toggle('active', view==='active');
  document.getElementById('tab-runsheet').classList.toggle('active', view==='runsheet');
  document.getElementById('active-view').style.display = view==='active' ? 'block' : 'none';
  document.getElementById('runsheet-view').style.display = view==='runsheet' ? 'block' : 'none';
  document.getElementById('archived-toggle').style.display = view==='active' ? 'inline-block' : 'none';
  const title=document.getElementById('page-title'), sub=document.getElementById('page-sub');
  if(view==='runsheet'){
    title.textContent='Runsheet';
    sub.textContent='Jobs scheduled for transport — installs and pickups with a truck assigned';
    renderRunsheet();
  } else {
    title.textContent='Active Jobs';
    sub.textContent='Click a job to manage items and update status';
  }
}

// ── Runsheet date navigation ──
// Local calendar date as YYYY-MM-DD, not UTC — "today" must match the
// date the person is actually looking at the screen on, not whatever
// day it happens to be in UTC at that moment.
function localDateStr(d){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
let runsheetViewDate=new Date(); // the date currently shown on the runsheet tab — defaults to today
function shiftRunsheetDate(deltaDays){
  runsheetViewDate=new Date(runsheetViewDate.getTime());
  runsheetViewDate.setDate(runsheetViewDate.getDate()+deltaDays);
  renderRunsheet();
}
function goToToday(){
  runsheetViewDate=new Date();
  renderRunsheet();
}
function formatRunsheetBadgeDate(dateStr){
  // dateStr is "YYYY-MM-DD" from the database — parse as local, not UTC,
  // so it displays as the date that was actually picked, not shifted by
  // a timezone offset.
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  return dt.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}

function renderRunsheet(){
  const todayStr=localDateStr(runsheetViewDate);
  const label=document.getElementById('runsheet-date-label');
  const isToday=localDateStr(new Date())===todayStr;
  label.textContent=runsheetViewDate.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'})+(isToday?' (Today)':'');

  // Any job with a runsheet date set for this day shows here — owner and
  // truck assignment are not required. The runsheet is also used to
  // plan ahead (e.g. loading trucks the afternoon before a job goes
  // out), so a job often won't have a truck/owner locked in yet at the
  // point someone's organising which day it falls on.
  const scheduled=lastFetchedJobs.filter(j=>j.runsheet_date===todayStr);

  const content=document.getElementById('runsheet-content');
  if(!scheduled.length){
    content.innerHTML=`<div class="runsheet-empty">Nothing scheduled for this day yet.<br>Use the calendar icon on a job tile in Active Jobs to add one.</div>`;
    return;
  }

  // Jobs with no time yet still need to be visible — they're not lost,
  // just not placed on the timeline until someone picks a slot. Shown
  // above the timeline rather than hidden, since a job that's scheduled
  // for the day but has no time yet is exactly the kind of thing the
  // transport team needs to notice and fill in, not something to bury.
  const unscheduled=scheduled.filter(j=>!j.runsheet_time);
  const timed=scheduled.filter(j=>j.runsheet_time);
  const byTime={};
  for(const job of timed){
    if(!byTime[job.runsheet_time]) byTime[job.runsheet_time]=[];
    byTime[job.runsheet_time].push(job);
  }

  let html='';
  if(unscheduled.length){
    html+=`<div class="runsheet-unscheduled">
      <div class="runsheet-section-title">Unscheduled <span class="count">${unscheduled.length}</span></div>
      <div class="runsheet-unscheduled-row">${unscheduled.map(runsheetTimelineCardHTML).join('')}</div>
    </div>`;
  }

  html+='<div class="runsheet-timeline">';
  for(const slot of runsheetTimeSlots){
    const jobsInSlot=byTime[slot]||[];
    html+=`<div class="runsheet-timeline-row${jobsInSlot.length?' has-jobs':''}">
      <div class="runsheet-timeline-time">${formatTimeSlotLabel(slot)}</div>
      <div class="runsheet-timeline-cards">${jobsInSlot.map(runsheetTimelineCardHTML).join('')}</div>
    </div>`;
  }
  html+='</div>';

  content.innerHTML=html;
}

function runsheetTimelineCardHTML(job){
  const colour=COLOUR_MAP[job.colour]||'#888';
  const RUNSHEET_TYPE_CLASS={install:'runsheet-card-install', pickup:'runsheet-card-pickup', to_load:'runsheet-card-toload'};
  const typeClass=RUNSHEET_TYPE_CLASS[job.runsheet_type]||'';
  const truckBit=job.truck?` · ${job.truck}`:'';
  return `<div class="runsheet-timeline-card ${typeClass}" onclick="openRunsheetPopover('${job.id}', this)">
    <div class="runsheet-card-colour" style="background:${colour}"></div>
    <div class="runsheet-card-info">
      <div class="runsheet-card-top">
        <span class="runsheet-card-ref">${job.job_ref||job.job_number}</span>
        <span class="runsheet-card-type">${RUNSHEET_TYPE_LABELS[job.runsheet_type]||job.runsheet_type}</span>
      </div>
      <div class="runsheet-card-addr">${job.address||''}${truckBit}</div>
    </div>
  </div>`;
}

// ── Add to Runsheet popover ──
let runsheetPopoverJobId=null;
let runsheetPopoverType=null;
const RUNSHEET_TYPES=['install','pickup','to_load'];
function updateRunsheetTypeButtons(selectedType){
  RUNSHEET_TYPES.forEach(t=>{
    document.getElementById('runsheet-type-'+t).classList.toggle('selected', t===selectedType);
  });
}
function openRunsheetPopover(jobId, btnEl){
  runsheetPopoverJobId=jobId;
  const job=jobsById.get(jobId);
  runsheetPopoverType=job?.runsheet_type||null;

  document.getElementById('runsheet-popover-date').value=job?.runsheet_date||'';
  document.getElementById('runsheet-popover-time').value=job?.runsheet_time||'';
  updateRunsheetTypeButtons(runsheetPopoverType);
  document.getElementById('runsheet-remove-btn').style.display=job?.runsheet_date?'inline-block':'none';

  document.getElementById('runsheet-popover-overlay').classList.add('open');
  document.getElementById('runsheet-popover').classList.add('open');
}
function closeRunsheetPopover(){
  document.getElementById('runsheet-popover-overlay').classList.remove('open');
  document.getElementById('runsheet-popover').classList.remove('open');
  runsheetPopoverJobId=null;
}
function selectRunsheetType(type){
  runsheetPopoverType=type;
  updateRunsheetTypeButtons(type);
}
async function saveRunsheetEntry(){
  const date=document.getElementById('runsheet-popover-date').value;
  const time=document.getElementById('runsheet-popover-time').value||null;
  if(!date){ alert('Pick a date first.'); return; }
  if(!runsheetPopoverType){ alert('Choose Install, Pickup, or To Load.'); return; }
  await fetch(`/api/jobs/${runsheetPopoverJobId}/runsheet`,{
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({runsheet_date:date, runsheet_type:runsheetPopoverType, runsheet_time:time})
  });
  const job=jobsById.get(runsheetPopoverJobId);
  if(job){ job.runsheet_date=date; job.runsheet_type=runsheetPopoverType; job.runsheet_time=time; }
  closeRunsheetPopover();
  renderJobs();
  if(currentView==='runsheet') renderRunsheet();
}
async function removeFromRunsheet(){
  await fetch(`/api/jobs/${runsheetPopoverJobId}/runsheet`,{
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({runsheet_date:null, runsheet_type:null, runsheet_time:null})
  });
  const job=jobsById.get(runsheetPopoverJobId);
  if(job){ job.runsheet_date=null; job.runsheet_type=null; job.runsheet_time=null; }
  closeRunsheetPopover();
  renderJobs();
  if(currentView==='runsheet') renderRunsheet();
}

function renderJobs(){
  const grid=document.getElementById('jobs-grid');
  let jobs=showArchived?lastFetchedJobs:lastFetchedJobs.filter(j=>j.status!=='archived');

  if(searchQuery.trim()){
    const q=searchQuery.trim().toLowerCase();
    jobs=jobs.filter(j=>{
      const ref=(j.job_ref||'').toLowerCase();
      const num=(j.job_number||'').toLowerCase();
      const addr=(j.address||'').toLowerCase();
      return ref.includes(q)||num.includes(q)||addr.includes(q);
    });
  }

  if(!jobs.length){
    const msg=searchQuery.trim()
      ? `No jobs match "${searchQuery.trim()}"`
      : (showArchived?'No completed jobs found':'No active jobs');
    grid.innerHTML=`<div class="empty"><div class="empty-title">No jobs found</div><div class="empty-sub">${msg}</div></div>`;
    return;
  }

  // Group by status, sort each group by stage date ascending
  const groups={};
  for(const job of jobs){
    const status=job.status||'ready';
    if(!groups[status])groups[status]=[];
    groups[status].push(job);
  }
  for(const status in groups){
    groups[status].sort((a,b)=>parseStageDate(a.stage_date)-parseStageDate(b.stage_date));
  }

  // Render sections in defined status order; skip empty/unlisted statuses safely
  const orderedStatuses=STATUS_ORDER.filter(s=>groups[s]&&groups[s].length);
  Object.keys(groups).forEach(s=>{if(!orderedStatuses.includes(s))orderedStatuses.push(s);});

  let html='';
  for(const status of orderedStatuses){
    const label=STATUS_SECTION_LABELS[status]||status;
    html+=`<div class="status-section">
      <div class="status-section-header">${label} <span class="status-section-count">${groups[status].length}</span></div>
      <div class="jobs-grid-inner">${groups[status].map(jobCardHTML).join('')}</div>
    </div>`;
  }
  grid.innerHTML=html;
}

function handleSearchInput(value){
  searchQuery=value;
  const clearBtn=document.getElementById('search-clear');
  clearBtn.style.display=value?'flex':'none';
  renderJobs();
}

function clearSearch(){
  searchQuery='';
  document.getElementById('job-search').value='';
  document.getElementById('search-clear').style.display='none';
  renderJobs();
}

loadRunsheetTimeSlots();
loadJobs();
</script>
